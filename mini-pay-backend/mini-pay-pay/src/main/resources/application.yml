server:
  port: 8084

spring:
  application:
    name: pay-service
  datasource:
    url: jdbc:mysql://localhost:3306/mini_pay?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: "416416"
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        ip: 127.0.0.1
        prefer-ip-address: true
  data:
    redis:
      host: localhost
      port: 6379
